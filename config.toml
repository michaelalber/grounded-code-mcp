# grounded-code-mcp — project configuration
#
# This file is committed to the repository and shared by all developers.
# It defines the collection structure, chunking parameters, and embedding
# model defaults that must stay consistent across the team.
#
# Machine-specific settings (Ollama host, Qdrant URL, custom paths) belong
# in your personal override file:
#   ~/.config/grounded-code-mcp/config.toml
# Copy config.toml.example to get started.

[knowledge_base]
# Directory containing source documents organized by collection
sources_dir = "sources"
# Directory for storing data (vector DB, manifest, etc.)
data_dir = ".grounded-code-mcp"
# Manifest file name (stored in data_dir)
manifest_file = "manifest.json"
# Maximum file size in MB. Files larger than this are skipped. 0 disables the check.
# Set high enough for large vendor PDFs (e.g. Telerik UI for Blazor ~221 MB).
max_file_size_mb = 500
# Split large PDFs into batches of this many pages before passing to Docling.
# Keeps peak memory bounded for large files. 0 disables batching.
pdf_page_batch_size = 50

[ollama]
# Embedding model — must match embedding_dim below.
# All team members should use the same model so embeddings are compatible.
model = "snowflake-arctic-embed2"
# Embedding dimensions (snowflake-arctic-embed2 = 1024)
embedding_dim = 1024
# Model context length in tokens (snowflake-arctic-embed2 = 8192)
context_length = 8192
# ollama.host — set in ~/.config/grounded-code-mcp/config.toml

[chunking]
# Text chunk size in characters
text_chunk_size = 1000
# Maximum text chunk size
text_chunk_max_size = 1500
# Overlap between text chunks
text_chunk_overlap = 200
# Maximum code chunk size before splitting on function boundaries
max_code_chunk_size = 3000

[vectorstore]
# Provider: "qdrant" (primary) or "chromadb" (fallback)
provider = "qdrant"
# Prefix for collection names
collection_prefix = "grounded_"
# vectorstore.qdrant_url — set in ~/.config/grounded-code-mcp/config.toml

# Collection mappings: source directory → collection name.
# The server prepends collection_prefix automatically.
# Add private collections in ~/.config/grounded-code-mcp/config.toml
# using the same [collections] table — entries are merged, not replaced.
[collections]
"sources/internal"             = "internal"
"sources/patterns"             = "patterns"
"sources/architecture"         = "architecture"
"sources/systems-thinking"     = "systems_thinking"
"sources/ui-ux"                = "ui_ux"
"sources/dotnet"               = "dotnet"
"sources/python"               = "python"
"sources/databases"            = "databases"
"sources/edge-ai"              = "edge_ai"
"sources/industrial-automation" = "automation"
"sources/4d-legacy"            = "4d_legacy"
"sources/php"                  = "php"
"sources/javascript"           = "javascript"
"sources/gov"                  = "gov"
"sources/robotics"             = "robotics"
